<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Alibi - Bantuan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header h3 { font-size: 14px; font-weight: 600; }
    .chat-header p { font-size: 11px; opacity: 0.85; }
    .chat-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg {
      max-width: 85%; padding: 8px 12px; border-radius: 12px;
      font-size: 13px; line-height: 1.5; white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end; background: #6c5ce7; color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start; background: #f1f5f9; color: #1e293b;
      border-bottom-left-radius: 4px;
    }
    .msg.bot p { margin-bottom: 6px; }
    .msg.bot ul, .msg.bot ol { margin-left: 16px; margin-bottom: 6px; }
    .msg.bot code {
      background: #e2e8f0; padding: 1px 4px; border-radius: 3px;
      font-size: 12px; font-family: 'Courier New', monospace;
    }
    .msg.bot strong { font-weight: 600; }
    .typing {
      align-self: flex-start; background: #f1f5f9; color: #94a3b8;
      padding: 8px 14px; border-radius: 12px; font-size: 13px;
      border-bottom-left-radius: 4px;
    }
    .typing-dots { display: flex; gap: 4px; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #94a3b8; animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
    .chat-input {
      padding: 8px 12px; border-top: 1px solid #e2e8f0;
      display: flex; gap: 8px; background: white; flex-shrink: 0;
    }
    .chat-input input {
      flex: 1; padding: 8px 12px; border: 1px solid #e2e8f0;
      border-radius: 20px; font-size: 13px; outline: none;
    }
    .chat-input input:focus { border-color: #6c5ce7; }
    .chat-input button {
      width: 36px; height: 36px; border-radius: 50%; border: none;
      background: #6c5ce7; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
    .welcome-msg {
      text-align: center; color: #94a3b8; padding: 20px 10px;
      font-size: 12px; line-height: 1.6;
    }
    .welcome-msg h3 { color: #1e293b; font-size: 16px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="chat-header">
    <div class="chat-avatar">🎓</div>
    <div>
      <h3>Creative Alibi Support</h3>
      <p>DeepSeek AI — Jawab pertanyaan seputar add-in</p>
    </div>
  </div>

  <div class="chat-messages" id="messages">
    <div class="welcome-msg">
      <h3>👋 Ada yang bisa dibantu?</h3>
      Contoh pertanyaan:<br/>
      • "Cara install add-in di Word?"<br/>
      • "Apa itu keystroke forensics?"<br/>
      • "Error koneksi server"
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="input" placeholder="Tanya apa aja..." autofocus />
    <button id="send" title="Kirim">➤</button>
  </div>

  <script>
    const PROXY_URL = window.location.origin;
    const API_KEY = localStorage.getItem('ca_api_key') || '';

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    let history = [];

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;
      addMessage(text, 'user');
      addTyping();

      try {
        const res = await fetch(PROXY_URL + '/api/support', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...(API_KEY ? { 'X-API-Key': API_KEY } : {}),
          },
          body: JSON.stringify({ message: text, history }),
        });
        const data = await res.json();

        removeTyping();
        if (data.success) {
          addMessage(data.reply, 'bot');
          history.push({ role: 'user', content: text });
          history.push({ role: 'assistant', content: data.reply });
        } else {
          addMessage('❌ ' + (data.error || 'Gagal terhubung ke server.'), 'bot');
        }
      } catch (err) {
        removeTyping();
        addMessage('❌ Error koneksi. Cek apakah server berjalan.', 'bot');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
